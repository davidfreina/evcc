name: Sync, Patch and Release
on:
  schedule:
    - cron: '0 0 * * *' # Läuft täglich um Mitternacht
  workflow_dispatch:
    inputs:
      forceDockerBuild:
        description: 'Force docker build'
        required: true
        default: false
        type: boolean

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new Upstream Release
        id: check_release
        run: |
          # Hole den neuesten Release-Tag vom Original (Upstream)
          UPSTREAM_TAG=$(curl -s https://api.github.com/repos/evcc-io/evcc/releases/latest | jq -r .tag_name)
          # Hole deinen letzten Release-Tag
          MY_TAG=$(git describe --tags --abbrev=0 || echo "none")

          echo "Upstream: $UPSTREAM_TAG, Mine: $MY_TAG"
          if [ "$UPSTREAM_TAG" != "null" ]; then
            echo "tag=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
            if [ "$UPSTREAM_TAG" != "$MY_TAG" ]; then
              echo "new_version=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Sync and Patch YAML
        if: steps.check_release.outputs.new_version == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/evcc-io/evcc.git
          git fetch upstream --tags --force

          find . -maxdepth 1 ! -name '.' ! -name '.git' ! -name '.github' -exec rm -rf {} +

          git checkout ${{ steps.check_release.outputs.tag }} -- . ':!.github/workflows'

          # 3. YAML Patch (Charger)
          FILE_YAML="templates/definition/charger/ocpp-goe.yaml"
          if [ -f "$FILE_YAML" ]; then
            echo "Patching YAML..."
            yq -i 'del(.requirements.evcc[] | select(. == "sponsorship"))' "$FILE_YAML"
          fi

          # 4. Go Source Patches (Sponsor Auth)
          FILE_GO="util/sponsor/auth.go"
          if [ -f "$FILE_GO" ]; then
            echo "Patching Go files..."
            sed -i 's/return len(Subject) > 0/return true/' "$FILE_GO"
            sed -i 's/return IsAuthorized() && Subject != unavailable && Token != ""/return IsAuthorized()/' "$FILE_GO"
            
            if ! grep -A 2 "defer mu.Unlock()" "$FILE_GO" | grep -q "return nil"; then
              sed -i '/func ConfigureSponsorship/,/^}/{ /defer mu.Unlock()/a\
              return nil
              }' "$FILE_GO"
            fi
          fi

          # 5. Alle Änderungen committen und Force-Push auf deinen Master
          # Damit wird dein Fork-Master exakt zum Release-Stand + Patches
          git add .
          git commit -m "chore: sync to ${{ steps.check_release.outputs.tag }} and apply patches"
          git push origin master --force

      - name: Create Release
        if: steps.check_release.outputs.new_version == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.check_release.outputs.tag }}
          name: Release ${{ steps.check_release.outputs.tag }}
          body: "Automatisierter Sync mit Upstream Release ${{ steps.check_release.outputs.tag }}"

      - name: Set up Docker Buildx
        if: steps.check_release.outputs.new_version == 'true' || inputs.forceDockerBuild == true
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: steps.check_release.outputs.new_version == 'true' || inputs.forceDockerBuild == true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.check_release.outputs.new_version == 'true' || inputs.forceDockerBuild == true
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Das Image wird unter deinem Namen gespeichert
          tags: |
            ghcr.io/${{ github.repository_owner }}/evcc:latest
            ghcr.io/${{ github.repository_owner }}/evcc:${{ steps.check_release.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
